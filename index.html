<!DOCTYPE html>
<html lang="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloner.ir</title>
    <link rel="stylesheet" href="./stayle/Stayle.css">
    <link rel="stylesheet" href="./stayle/Responsiv.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
</head>
<body>
    <div class="content">
        <header>
            <!-- header -->
            <!-- header-top -->
            <nav class="headercontenttop">
                <div class="headernavbar header-contentleft">
                    <button id="clickonslider"><i class="fas fa-bars"></i></button>
                </div>
                <img class="logo" src="./static/img/ChatGPT Image Jun 2, 2026, 11_09_51 AM.jpg" alt="">
                <div class="headernavbar header-contentright">
                    <button onclick="selectpage('search',this)"><i class="fas fa-search"></i></button>
                </div>
            </nav>
            <!-- header-down -->    
            <nav class="headercontentdown">
                <div class="header-contentdownbtn">
                    <button onclick="selectpage('home',this)" class="tabsclickheader active"><i class="fas fa-home"></i><span>خانه</span></button>
                    <button onclick="selectpage('all',this)" class="tabsclickheader"><i class="fas fa-bars"></i><span>دسته بندی ها</span></button>
                    <button onclick="selectpage('download',this)" class="tabsclickheader"><i class="fas fa-download"></i><span>دانلود ها</span></button>
                    <button onclick="selectpage('login',this)" class="tabsclickheader"><i class="fas fa-user"></i><span>ورود</span></button>
                </div>
            </nav>
        </header>
        <!-- bars-content-->
        <div class="barsslider-menu" id="barsslider">

        </div>
        <!-- bars-blur-->
        <div class="blurslider-blur" id="blurslider"></div>
        <!-- main-->
        <main>
            <div class="maincontent">
                <!-- main-home -->
                <section class="sections active" id="home">
                    <div class="homecontent">
                        <div class="homecontent-slider">
                            <div class="swiperslider">
                                <div class="swiper">
                                    <div class="swiper-wrapper">
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Minecraft.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Fc.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Pes.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Callof.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-EuroTrack.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Forzahorizon.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-NeedFor-Speed.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-RedDead.jpg" alt=""></div>
                                    </div>
                                    <div class="swiper-pagination"></div>
                                </div>
                            </div>
                        </div>
                        <div class="boxgamelook">
                            <div class="boxlogogame">
                                <span class="boxslidertext">: دسته ها</span>
                                <div class="boxgamebtn">
                                    <button><img class="logogamebtn" src="./static/img/Logo game-pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-Fifa.jpg" alt="fifalogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-EuroTrack.jpg" alt="eurotracklogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-Fifa.jpg" alt=""></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-Fifa.jpg" alt="fifalogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-EuroTrack.jpg" alt="eurotracklogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-Fifa.jpg" alt=""></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-Fifa.jpg" alt="fifalogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-EuroTrack.jpg" alt="eurotracklogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Logo game-Fifa.jpg" alt=""></button>
                                </div>
                            </div>
                        </div>
                        <div class="boxdownloadnewgame">
                                <span class="boxslidertext">: پر طرفدار ترین</span>
                            <div class="card-downloadnewgame" id="cardgamebox">
                            
                            </div>
                        </div>
                </section>
                <!-- main-all -->
                <section class="sections" id="all">
                    <div class="allcontent">
                        <div class="boxall-search">
                            <input class="Search-allcardgame" type="text" placeholder="Serach In The CardGame...">
                            <div class="boxallspans">
                                <span class="boxallspan">PES</span>
                                <span class="boxallspan">GTA</span>
                                <span class="boxallspan">FC</span>
                                <span class="boxallspan">Reddead</span>    
                            </div>
                        </div>
                        <div class="boxall-gamecard">
                            <div class="boxgame-all" id="allcardgame">

                            </div>
                        </div>
                    </div>
                </section>
                <!-- main-download -->
                <section class="sections" id="download">
                    download
                </section>
                <!-- main-save -->
                <section class="sections" id="save">
                    save
                </section>
                <!-- main-login -->
                <section class="sections" id="login">
                    <div class="logincontent">
                        <form action="">
                            <label for=""></label>
                            <input type="text">
                        </form>
                    </div>
                </section>
            </div>
        </main>
        <!-- footer -->
        <footer>
            <div class="footercontent">
                <div class="boxfootercontent">
                    <div class="bottomfooter">
                        <div class="gamecompany">
                            <span class="konamicomponi-footer">KONAMI</span>
                            <span class="esportcomponi-footer">ESPORT</span>
                            <span class="rackstarcomponi-footer">RACKSTAR</span>
                            <span class="fifacomponi-footer">FIFA</span>
                        </div>
                        <div class="brandslink-footer">
                            <a href="" class="instagrambrand-footer"><i class="fa-brands fa-instagram"></i></a>
                            <a href="" class="telegrambrand-footer"><i class="fa-brands fa-telegram"></i></a>
                            <a href="" class="youtubebrand-footer"><i class="fa-brands fa-youtube"></i></a>
                            <a href="" class="githubbrand-footer"><i class="fa-brands fa-github"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="./script/Script.js"></script>
</body>
</html>
