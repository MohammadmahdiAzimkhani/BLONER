<!DOCTYPE html>
<html lang="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLONER</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/responsiv.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
</head>
<body>
    <div class="content">
        <header>
            <!-- header -->
            <!-- header-top -->
            <nav class="headercontenttop">
                <div class="headrtop-boxbars">
                    <button class="headertop-btn" id="clickonslider"><i class="fas fa-bars"></i></button>
                </div>
                <div class="headrtop-boxlogo">
                    <img class="headertop-logo" src="./static/img/ChatGPT Image Jun 2, 2026, 11_09_51 AM.jpg" alt="">
                </div>
                <div class="headrtop-boxsearch">
                    <button class="headertop-btn"><i class="fas fa-search"></i></button>
                </div>
            </nav>
            <!-- header-down -->    
            <nav class="headercontentdown">
                <div class="header-contentdownbtn">
                    <button onclick="selectpage('home',this,0)" class="tabsclickheader active"><i class="fas fa-home"></i><span>خانه</span></button>
                    <button onclick="selectpage('all',this,1)" class="tabsclickheader"><i class="fas fa-bars"></i><span>دسته بندی ها</span></button>
                    <button onclick="selectpage('download',this,2)" class="tabsclickheader"><i class="fas fa-download"></i><span>دانلود ها</span></button>
                    <button onclick="selectpage('login',this,3)" class="tabsclickheader"><i class="fas fa-user"></i><span>ورود</span></button>
                </div>
            </nav>
        </header>
        <!-- bars-content-->
        <div class="box-barsslider" id="barsslider">
            <div class="barscontent">
                <div class="boxprofile">
                    <div class="imgprofile">
                        <i class="fas fa-user"></i>
                        <button class="addprofilebtn"><i class="fas fa-add"></i></button>
                    </div>
                    <div class="nameprofile">
                        <p>mohammad</p>
                        <button class="renameprofilebarsbtn"><i class="fas fa-pencil"></i></button>
                    </div>
                </div>
                <div class="boxbarscontent">
                    <button onclick="pagebars('home',0,this)" class="boxbarscontentbtn active">خانه</button>
                    <button onclick="pagebars('all',1,this)" class="boxbarscontentbtn">دسته بندی</button>
                    <button onclick="pagebars('download',2,this)" class="boxbarscontentbtn">دانلود</button>
                    <button onclick="pagebars('login',3,this)" class="boxbarscontentbtn">ورود</button>
                     <button class="boxbarscontentbtn">تنظیمات</button>
                    <button class="boxbarscontentbtn">دسته بندی</button>
                    <button class="boxbarscontentbtn">دانلود</button>
                    <button class="boxbarscontentbtn">ورود</button>
                     <button class="boxbarscontentbtn">خانه</button>
                    <button class="boxbarscontentbtn">خانه</button>
                    <button class="boxbarscontentbtn">دسته بندی</button>
                    <button class="boxbarscontentbtn">دانلود</button>
                    <button class="boxbarscontentbtn">ورود</button>
                     <button class="boxbarscontentbtn">خانه</button>
                    <button class="boxbarscontentbtn">دسته بندی</button>
                    <button class="boxbarscontentbtn">دانلود</button>
                    <button class="boxbarscontentbtn">ورود</button>
                     <button class="boxbarscontentbtn">خانه</button>
                </div>
            </div>
        </div>
        <!-- bars-blur-->
        <div class="box-blurslider" id="blurslider"></div>
        <!-- main-->
        <main>
            <div class="maincontent">
                <!-- main-home -->
                <section class="sections active" id="home">
                    <div class="homecontent">
                        <div class="homecontent-slider">
                            <div class="swiperslider">
                                <div class="swiper">
                                    <div class="swiper-wrapper">
                                        <div class="swiper-slide"><img loading="lazy" class="imgswiper" src="./static/img/Cover-Minecraft.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Fc.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Pes.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Callof.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-EuroTrack.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-Forzahorizon.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-NeedFor-Speed.jpg" alt=""></div>
                                        <div class="swiper-slide"><img class="imgswiper" src="./static/img/Cover-RedDead.jpg" alt=""></div>
                                    </div>
                                    <div class="swiper-pagination"></div>
                                </div>
                            </div>
                        </div>
                        <div class="boxgamelook">
                            <div class="boxlogogame">
                                <span class="boxslidertext">: دسته ها</span>
                                <div class="boxgamebtn">
                                    <button><img class="logogamebtn" src="./static/img/Cover-gta.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Forzahorizon.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Minecraft.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Minecraft.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-RedDead.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-gta.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Forzahorizon.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Minecraft.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Minecraft.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-RedDead.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-gta.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-gta.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-gta.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Forzahorizon.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Minecraft.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Minecraft.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-Pes.jpg" alt="peslogo"></button>
                                    <button><img class="logogamebtn" src="./static/img/Cover-RedDead.jpg" alt="peslogo"></button>
                                </div>
                            </div>
                        </div>
                        <div class="boxdownloadnewgame">
                                <span class="boxslidertext">: پر طرفدار ترین</span>
                            <div class="card-downloadnewgame" id="cardgamebox">
                            
                            </div>
                        </div>
                        <div class="boxdownloadnewgame">
                                <span class="boxslidertext">: جدید ترین</span>
                            <div class="card-downloadnewgame" id="cardgameboxnew">
                            
                            </div>
                        </div>
                         <div class="boxdownloadnewgame">
                                <span class="boxslidertext">: بروز ترین</span>
                            <div class="card-downloadnewgame" id="cardgameboxupdate">
                            
                            </div>
                        </div>
                </section>
                <!-- main-all -->
                <section class="sections" id="all">
                    <div class="allcontent">
                        <div class="boxall-search">
                            <input class="Search-allcardgame" type="text" placeholder="Serach In The CardGame...">
                            <div class="boxallspans">
                                <span onclick="selectallcard('.all',this)" class="boxallspan active">ALL</span>    
                                <span onclick="selectallcard('.pes',this)" class="boxallspan">PES</span>
                                <span onclick="selectallcard('.gta',this)" class="boxallspan">GTA</span>
                                <span onclick="selectallcard('.fc',this)" class="boxallspan">FC</span>
                            </div>
                        </div>
                        <div class="boxall-gamecard">
                            <div class="boxgame-all" id="allcardgame">
                                
                            </div>
                        </div>
                    </div>
                </section>
                <!-- main-download -->
                <section class="sections" id="download">
                    <div class="downloadcontent">
                        <div class="boxsearchdownload">
                            <input class="Search-allcardgame" type="text" placeholder="Serach In The CardGame...">
                        </div>
                        <div class="boxcarddownloadopens">
                            <div class="carddownloadopen">
                                <img src="./static/img/Cover-RedDead.jpg" alt="">
                                <div class="boxdownloadcenter">
                                    <div class="boxdescriptiondownload">
                                        <span>Reddead</span>
                                        <div class="boxnumbersizedownload">
                                            45%
                                        </div>
                                    </div>
                                      <div class="inlinedownload">
                                        <div class="backgrounddownloadsize"></div>
                                        <div class="inlinedownloadsize"></div>
                                    </div>
                                </div>
                                <div class="boxdownloadicon">
                                    <button><i class="fas fa-download"></i></button>
                                </div>
                            </div>
                            <div class="carddownloadopen">
                                <img src="./static/img/Cover-gta.jpg" alt="">
                                <div class="boxdownloadcenter">
                                    <div class="boxdescriptiondownload">
                                        <span>GTA</span>
                                        <div class="boxnumbersizedownload">
                                            45%
                                        </div>
                                    </div>
                                    <div class="inlinedownload">
                                        <div class="backgrounddownloadsize"></div>
                                        <div class="inlinedownloadsize"></div>
                                    </div>
                                </div>
                                <div class="boxdownloadicon">
                                    <button><i class="fas fa-download"></i></button>
                                </div>
                            </div>
                            <div class="carddownloadopen">
                                <img src="./static/img/Cover-Minecraft.jpg" alt="">
                               <div class="boxdownloadcenter">
                                    <div class="boxdescriptiondownload">
                                       <span>Maincontent</span>
                                        <div class="boxnumbersizedownload">
                                            45%
                                        </div>
                                    </div>
                                      <div class="inlinedownload">
                                        <div class="backgrounddownloadsize"></div>
                                        <div class="inlinedownloadsize"></div>
                                    </div>
                                </div>
                                <div class="boxdownloadicon">
                                    <button><i class="fas fa-download"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- main-save -->
                <section class="sections" id="save">
                    save
                </section>
                <!-- main-login -->
                <section class="sections" id="login">
                    <div class="logincontent">
                        <form action="">
                            <span class="brandtext-logn">BLONER</span>
                            <input class="inputform" type="text" placeholder="...ایمیل">
                            <input class="inputform" type="password" placeholder="...پسورد">
                            <div class="boxcheckbox">
                                <span>من روبات نیستم</span>
                                <input class="checkboxformlogin" type="checkbox" name="" id="">
                            </div>
                            <button class="submitbtn" type="submit">ورود</button>
                            <div class="boxcreateacant-nopassword">
                                <button>فراموشی رمز عبور</button>
                                <button>ساخت اکانت</button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </main>
        <!-- footer -->
        <footer>
            <div class="footercontent">
                <div class="boxfootercontent">
                    <div class="bottomfooter">
                        <div class="gamecompany">
                            <span class="konamicomponi-footer">KONAMI</span>
                            <span class="esportcomponi-footer">ESPORT</span>
                            <span class="rackstarcomponi-footer">RACKSTAR</span>
                            <span class="fifacomponi-footer">FIFA</span>
                        </div>
                        <div class="brandslink-footer">
                            <a href="" class="instagrambrand-footer"><i class="fa-brands fa-instagram"></i></a>
                            <a href="" class="telegrambrand-footer"><i class="fa-brands fa-telegram"></i></a>
                            <a href="" class="youtubebrand-footer"><i class="fa-brands fa-youtube"></i></a>
                            <a href="" class="githubbrand-footer"><i class="fa-brands fa-github"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="./script/cardgame.js"></script>
</body>
</html>
